name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            preset: release
            build_dir: build/release
            wheel_platform: manylinux_2_35_x86_64
          - os: macos-15
            platform: macos-arm64
            preset: release
            build_dir: build/release
            wheel_platform: macosx_15_0_arm64
          - os: macos-15-intel
            platform: macos-x86_64
            preset: release
            build_dir: build/release
            wheel_platform: macosx_15_0_x86_64
          - os: windows-2022
            platform: windows-x86_64
            preset: release-windows
            build_dir: build/release-windows
            wheel_platform: win_amd64

    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgGitCommitId: a0400024711b283056538ac19ced80b91a83c24c
          runVcpkgInstall: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate tag, version, and changelog
        run: >-
          python packaging/scripts/release_tools.py validate
          --root .
          --tag "${{ github.ref_name }}"
          --github-environment

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >-
          cmake --preset "${{ matrix.preset }}"
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake --preset "${{ matrix.preset }}"
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build release
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Install release tree
        run: >-
          cmake --install "${{ matrix.build_dir }}"
          --prefix stage
          --config Release

      - name: Verify native executable
        if: runner.os != 'Windows'
        run: test "$(stage/bin/sherpa --version)" = "$SHERPA_PACKAGE_VERSION"

      - name: Verify native executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $actual = & stage/bin/sherpa.exe --version
          if ($actual -ne $env:SHERPA_PACKAGE_VERSION) {
            throw "expected $env:SHERPA_PACKAGE_VERSION, got $actual"
          }

      - name: Build reproducible native archive
        run: >-
          python packaging/scripts/release_tools.py archive
          --install-directory stage
          --output-directory artifacts
          --version "$SHERPA_PACKAGE_VERSION"
          --platform "${{ matrix.platform }}"

      - name: Stage Python wheel
        run: >-
          python packaging/scripts/release_tools.py stage-wheel
          --install-directory stage
          --package-directory packaging/python

      - name: Build Python wheel
        working-directory: packaging/python
        shell: bash
        env:
          SHERPA_WHEEL_PLATFORM: ${{ matrix.wheel_platform }}
        run: |
          python -m pip install build==1.3.0
          python -m build --wheel --outdir ../../artifacts .

      - name: Verify Python wheel (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m venv wheel-test
          wheel-test/bin/python -m pip install --no-index artifacts/*.whl
          test "$(wheel-test/bin/sherpa --version)" = "$SHERPA_PACKAGE_VERSION"

      - name: Verify Python wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv wheel-test
          wheel-test/Scripts/python.exe -m pip install --no-index (Get-ChildItem artifacts/*.whl)
          $actual = & wheel-test/Scripts/sherpa.exe --version
          if ($actual -ne $env:SHERPA_PACKAGE_VERSION) {
            throw "expected $env:SHERPA_PACKAGE_VERSION, got $actual"
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download release artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Validate release metadata
        run: >-
          python packaging/scripts/release_tools.py validate
          --root .
          --tag "${{ github.ref_name }}"
          --notes-output release-notes.md
          --github-environment

      - name: Generate Homebrew formula
        run: >-
          python packaging/scripts/release_tools.py formula
          --repository "${{ github.repository }}"
          --version "$SHERPA_PACKAGE_VERSION"
          --artifact-directory artifacts
          --output artifacts/sherpa.rb

      - name: Generate checksums
        run: >-
          python packaging/scripts/release_tools.py checksums
          --output SHA256SUMS
          artifacts

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            artifacts/*
            SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          artifacts/*
          SHA256SUMS
          --verify-tag
          --title "Sherpa ${{ github.ref_name }}"
          --notes-file release-notes.md
