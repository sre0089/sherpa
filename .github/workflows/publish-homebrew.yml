name: Publish Homebrew

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing successful Sherpa release tag
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    environment: homebrew

    steps:
      - name: Check out released source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          path: sherpa

      - name: Validate release metadata
        working-directory: sherpa
        run: >-
          python packaging/scripts/release_tools.py validate
          --root .
          --tag "${{ inputs.tag }}"

      - name: Download released formula
        working-directory: sherpa
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ inputs.tag }}" --pattern "sherpa.rb" --dir release

      - name: Check out Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: sre0089/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          mkdir -p homebrew-tap/Formula
          cp sherpa/release/sherpa.rb homebrew-tap/Formula/sherpa.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sherpa.rb
          git commit -m "sherpa ${{ inputs.tag }}"
          git push
